<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AURA X</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        /* ==================== משתני מערכת ופלטת צבעים ==================== */
        :root {
            --piano-black: #000000;
            --studio-white: #FFFFFF;
            --ghost-grey: #F1F3F6;
            --border-card: 24px;
            --border-capsule: 40px;
            --bezier-apple: cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* ==================== איפוס ובסיס ==================== */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--studio-white);
            color: var(--piano-black);
            overflow-x: hidden;
            padding-bottom: 120px; /* מקום לנגן הצף */
        }

        /* ==================== אנימציות ==================== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spinMorph {
            0% { transform: rotate(0deg); border-radius: 8px; }
            50% { transform: rotate(180deg); border-radius: 50%; }
            100% { transform: rotate(360deg); border-radius: 8px; }
        }
        @keyframes recordSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ==================== Header ==================== */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: 15px;
            padding-inline: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .logo-box-container { display: flex; align-items: center; gap: 12px; }
        .logo-box {
            width: 28px; height: 28px;
            background-color: var(--piano-black);
            animation: spinMorph 4s infinite cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .brand-name { font-weight: 900; font-size: 1.2rem; letter-spacing: 1px; }
        .admin-trigger {
            width: 40px; height: 40px;
            background: transparent; border: none;
            opacity: 0.2; cursor: pointer;
        }

        /* ==================== אזור התוכן ==================== */
        main { margin-top: 100px; padding: 0 20px; }
        
        /* יוצרים */
        .creators-scroll {
            display: flex; gap: 15px; overflow-x: auto;
            padding-bottom: 20px; scrollbar-width: none;
        }
        .creators-scroll::-webkit-scrollbar { display: none; }
        .creator { position: relative; flex-shrink: 0; }
        .creator img {
            width: 85px; height: 85px;
            border-radius: 50%;
            border: 3px solid var(--ghost-grey);
            object-fit: cover;
        }
        .verified {
            position: absolute; bottom: 5px; right: 5px;
            width: 20px; height: 20px;
            background: var(--piano-black); border-radius: 50%;
            border: 2px solid var(--studio-white);
            display: flex; align-items: center; justify-content: center;
        }
        .verified::after { content: '✓'; color: white; font-size: 10px; font-weight: bold; }

        /* רשימת שירים */
        .track-list { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .track-item {
            display: flex; align-items: center; gap: 15px;
            height: 90px;
            background: var(--studio-white);
            border-radius: var(--border-card);
            padding: 10px;
            cursor: pointer;
            transition: transform 0.2s var(--bezier-apple);
            animation: fadeUp 0.6s var(--bezier-apple) backwards;
        }
        .track-item:active { transform: scale(0.95); }
        .track-thumb {
            width: 70px; height: 70px;
            border-radius: 18px;
            box-shadow: 0 15px 15px rgba(0,0,0,0.05);
            object-fit: cover;
        }
        .track-info { flex: 1; }
        .track-title { font-weight: 900; font-size: 1.1rem; }
        .track-artist { font-weight: 300; font-size: 0.9rem; color: #666; }

        /* ==================== נגן צף ==================== */
        #floating-player {
            position: fixed;
            bottom: 35px; left: 20px; right: 20px;
            height: 70px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: var(--border-capsule);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px 0 20px;
            color: var(--studio-white);
            z-index: 90;
            transform: translateY(150%);
            transition: transform 0.5s var(--bezier-apple);
            cursor: pointer;
        }
        #floating-player.active { transform: translateY(0); }
        #floating-player:active { transform: scale(0.95); }
        .player-info { display: flex; flex-direction: column; }
        .player-title { font-weight: 900; font-size: 1rem; }
        .player-status { font-weight: 300; font-size: 0.8rem; color: #aaa; }
        .player-record {
            width: 50px; height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #333;
        }
        .playing .player-record { animation: recordSpin 4s linear infinite; }

        /* ==================== The Vault (פאנל ניהול) ==================== */
        #admin-vault {
            position: fixed;
            top: 100%; left: 0; right: 0; bottom: 0;
            background: var(--ghost-grey);
            z-index: 200;
            transition: top 0.6s var(--bezier-apple);
            padding: max(40px, env(safe-area-inset-top)) 20px;
            display: flex; flex-direction: column;
        }
        #admin-vault.open { top: 0; }
        .vault-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .vault-title { font-weight: 900; font-size: 2rem; }
        .close-vault { background: none; border: none; font-size: 1.5rem; font-weight: 900; cursor: pointer; }
        
        .admin-form { display: flex; flex-direction: column; gap: 15px; }
        .admin-form input {
            padding: 15px; border-radius: 12px;
            border: 1px solid #ccc; font-family: 'Outfit'; font-weight: 400;
        }
        .btn-primary {
            background: var(--piano-black); color: var(--studio-white);
            border: none; padding: 15px; border-radius: var(--border-capsule);
            font-weight: 900; font-size: 1.1rem; cursor: pointer;
            transition: transform 0.2s var(--bezier-apple);
        }
        .btn-primary:active { transform: scale(0.95); }
        
        .admin-track-list { margin-top: 30px; overflow-y: auto; flex: 1; }
        .admin-track-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--studio-white); padding: 15px; border-radius: 12px; margin-bottom: 10px;
        }
        .btn-delete { color: red; background: none; border: none; font-weight: 900; cursor: pointer; }

        /* ==================== שכבת שחרור (Unlock Layer) ==================== */
        #unlock-layer {
            position: fixed; inset: 0;
            background: rgba(255,255,255,0.95);
            z-index: 999;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem; color: var(--piano-black);
            cursor: pointer; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="yt-player" style="position:fixed; top:-9999px;"></div>

    <div id="unlock-layer">Tap to Unlock AURA X</div>

    <header>
        <div class="logo-box-container">
            <div class="logo-box"></div>
            <div class="brand-name">AURA X</div>
        </div>
        <button class="admin-trigger" onclick="promptPin()">⚙</button>
    </header>

    <main>
        <div class="creators-scroll">
            <div class="creator"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" alt="Creator"><div class="verified"></div></div>
            <div class="creator"><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=150&q=80" alt="Creator"><div class="verified"></div></div>
            <div class="creator"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&q=80" alt="Creator"><div class="verified"></div></div>
            <div class="creator"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&q=80" alt="Creator"><div class="verified"></div></div>
        </div>
        <div class="track-list" id="user-track-list">
            </div>
    </main>

    <div id="floating-player" onclick="togglePlay()">
        <img src="" alt="Record" class="player-record" id="player-img">
        <div class="player-info">
            <div class="player-title" id="player-title">שם השיר</div>
            <div class="player-status" id="player-status">Tap to Pause</div>
        </div>
    </div>

    <div id="admin-vault">
        <div class="vault-header">
            <div class="vault-title">THE VAULT</div>
            <button class="close-vault" onclick="closeAdmin()">×</button>
        </div>
        <form class="admin-form" onsubmit="addSong(event)">
            <input type="text" id="song-title" placeholder="Song Title" required>
            <input type="text" id="song-artist" placeholder="Artist" required>
            <input type="text" id="song-yt" placeholder="YouTube Video ID (e.g. dQw4w9WgXcQ)" required>
            <input type="url" id="song-img" placeholder="Thumbnail URL" required>
            <button type="submit" class="btn-primary">Add Track</button>
        </form>
        <div class="admin-track-list" id="admin-track-list">
            </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // ==================== מסד נתונים (LocalStorage) ====================
        let defaultSongs = [
            { id: 1, title: 'Midnight City', artist: 'M83', ytId: 'dX3k_LSd3YY', img: 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=150&q=80' },
            { id: 2, title: 'Starboy', artist: 'The Weeknd', ytId: '34Na4j8HLjc', img: 'https://images.unsplash.com/photo-1619983081563-430f63602796?auto=format&fit=crop&w=150&q=80' }
        ];
        
        let songs = JSON.parse(localStorage.getItem('aurax_songs')) || defaultSongs;
        let ytPlayer;
        let currentSong = null;
        let isPlaying = false;
        let isUnlocked = false;

        function saveSongs() {
            localStorage.setItem('aurax_songs', JSON.stringify(songs));
            renderSongs();
        }

        // ==================== מנוע אודיו (YouTube API) ====================
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '10', width: '10',
                videoId: '',
                playerVars: { 'autoplay': 0, 'controls': 0, 'playsinline': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                document.getElementById('floating-player').classList.add('playing');
                document.getElementById('player-status').innerText = 'Playing - Tap to Pause';
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isPlaying = false;
                document.getElementById('floating-player').classList.remove('playing');
                document.getElementById('player-status').innerText = 'Paused - Tap to Play';
            }
        }

        // ==================== שכבת שחרור ופוליסת אוטופליי ====================
        document.getElementById('unlock-layer').addEventListener('click', function() {
            if (ytPlayer && ytPlayer.playVideo) {
                // טריק לקבלת אישור דפדפן לסאונד ברקע
                ytPlayer.playVideo();
                setTimeout(() => { ytPlayer.pauseVideo(); }, 100);
            }
            this.style.opacity = '0';
            setTimeout(() => { this.style.display = 'none'; }, 500);
            isUnlocked = true;
        });

        // ==================== לוגיקת נגן ותצוגה ====================
        function playSong(songId) {
            if (!isUnlocked) return;
            const song = songs.find(s => s.id === songId);
            currentSong = song;
            
            ytPlayer.loadVideoById(song.ytId);
            
            // עדכון UI
            const fp = document.getElementById('floating-player');
            fp.classList.add('active');
            document.getElementById('player-title').innerText = song.title;
            document.getElementById('player-img').src = song.img;

            // Media Session API (המשכיות ברקע ומסך נעילה)
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: song.artist,
                    album: 'AURA X',
                    artwork: [{ src: song.img, sizes: '512x512', type: 'image/jpeg' }]
                });

                navigator.mediaSession.setActionHandler('play', () => ytPlayer.playVideo());
                navigator.mediaSession.setActionHandler('pause', () => ytPlayer.pauseVideo());
            }
        }

        function togglePlay() {
            if (!currentSong) return;
            if (isPlaying) ytPlayer.pauseVideo();
            else ytPlayer.playVideo();
        }

        // ==================== רינדור CRUD ====================
        function renderSongs() {
            const userList = document.getElementById('user-track-list');
            const adminList = document.getElementById('admin-track-list');
            userList.innerHTML = ''; adminList.innerHTML = '';

            songs.forEach((song, index) => {
                // User View
                const item = document.createElement('div');
                item.className = 'track-item';
                item.style.animationDelay = `${index * 0.1}s`; // Staggered fade-up
                item.onclick = () => playSong(song.id);
                item.innerHTML = `
                    <img src="${song.img}" class="track-thumb" alt="thumb">
                    <div class="track-info">
                        <div class="track-title">${song.title}</div>
                        <div class="track-artist">${song.artist}</div>
                    </div>
                `;
                userList.appendChild(item);

                // Admin View
                const adminItem = document.createElement('div');
                adminItem.className = 'admin-track-item';
                adminItem.innerHTML = `
                    <div><strong>${song.title}</strong> - ${song.artist}</div>
                    <button class="btn-delete" onclick="deleteSong(${song.id})">Delete</button>
                `;
                adminList.appendChild(adminItem);
            });
        }

        // ==================== The Vault (אדמין) ====================
        function promptPin() {
            const pin = prompt("Enter Vault PIN:");
            if (pin === "2026") {
                document.getElementById('admin-vault').classList.add('open');
            } else if (pin !== null) {
                alert("Incorrect PIN");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-vault').classList.remove('open');
        }

        function addSong(e) {
            e.preventDefault();
            const newSong = {
                id: Date.now(),
                title: document.getElementById('song-title').value,
                artist: document.getElementById('song-artist').value,
                ytId: document.getElementById('song-yt').value,
                img: document.getElementById('song-img').value
            };
            songs.unshift(newSong);
            saveSongs();
            e.target.reset();
        }

        function deleteSong(id) {
            songs = songs.filter(s => s.id !== id);
            saveSongs();
        }

        // אתחול
        renderSongs();

    </script>
</body>
</html>

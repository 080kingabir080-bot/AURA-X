<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio v2</title>

<style>
body{
margin:0;
font-family:system-ui;
background: radial-gradient(circle at top,#111,#050507);
color:white;
}

header{
padding:18px;
text-align:center;
background:rgba(255,255,255,0.04);
backdrop-filter: blur(10px);
font-weight:600;
}

.container{padding:15px;max-width:1000px;margin:auto}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
}

.card{
background:rgba(255,255,255,0.06);
border-radius:16px;
padding:15px;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.12);
}

.song{
padding:12px;
margin:6px 0;
border-radius:10px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.song:hover{background:#222}

input,button{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

button{
background:#00ffd5;
cursor:pointer;
font-weight:bold;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
}

#yt{
width:100%;
height:180px;
border-radius:12px;
border:none;
}
</style>
</head>

<body>

<header>🎧 AURA Studio v2</header>

<div class="container">

<input id="search" placeholder="חיפוש..." oninput="search()">

<button onclick="adminMode()">Admin Add Song</button>

<h3>אמנים</h3>
<div id="artists" class="grid"></div>

<h3>Library</h3>
<div id="library"></div>

</div>

<div class="player">
<iframe id="yt"></iframe>
</div>

<script>

/* =========================
   📦 CORE DB
========================= */

let DB = JSON.parse(localStorage.getItem("aura_v2")) || {
artists:[
{
name:"Travis Scott",
songs:[
{title:"FE!N",id:"U-l4Ya3ejko"}
]
}
]
};

/* =========================
   🎤 RENDER
========================= */

function render(){
artists.innerHTML="";

DB.artists.forEach(a=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=a.name;

d.onclick=()=>open(a);

artists.appendChild(d);
});
renderLibrary();
}

/* =========================
   🎧 OPEN ARTIST
========================= */

function open(a){
artists.innerHTML="";

a.songs.forEach(s=>{
let d=document.createElement("div");
d.className="song";
d.innerHTML="🎵 "+s.title;

d.onclick=()=>play(s.id);

artists.appendChild(d);
});
}

/* =========================
   ▶ PLAY FIX (no broken iframe links)
========================= */

function play(id){
yt.src="https://www.youtube.com/embed/"+id+"?autoplay=1&rel=0";
}

/* =========================
   📦 LIBRARY
========================= */

function renderLibrary(){
library.innerHTML="";

DB.artists.forEach(a=>{
a.songs.forEach(s=>{
let d=document.createElement("div");
d.className="song";
d.innerHTML="🎧 "+s.title;

d.onclick=()=>play(s.id);

library.appendChild(d);
});
});
}

/* =========================
   🔍 SEARCH
========================= */

function search(){
let q=search.value.toLowerCase();

artists.innerHTML="";

DB.artists.forEach(a=>{
if(a.name.toLowerCase().includes(q)){
let d=document.createElement("div");
d.className="card";
d.innerHTML=a.name;
d.onclick=()=>open(a);
artists.appendChild(d);
}
});
}

/* =========================
   🔐 ADMIN PANEL
========================= */

function adminMode(){
let pass=prompt("admin password");
if(pass!=="2004")return alert("denied");

let artist=prompt("artist name");
let title=prompt("song title");
let id=prompt("YouTube VIDEO ID בלבד (לא לינק)");

let found=DB.artists.find(a=>a.name===artist);

if(!found){
found={name:artist,songs:[]};
DB.artists.push(found);
}

found.songs.push({title,id});

localStorage.setItem("aura_v2",JSON.stringify(DB));

render();
}

/* =========================
   INIT
========================= */

render();

</script>

</body>
</html>

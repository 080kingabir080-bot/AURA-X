<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0a0a0f;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:22px;
letter-spacing:2px;
background:rgba(255,255,255,0.03);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.05);
padding:18px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.card:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.1);
}

.song{
padding:15px;
border-bottom:1px solid #222;
cursor:pointer;
}

.song:hover{
background:#111;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
}

iframe{
width:100%;
height:200px;
border:none;
}

.hidden{display:none;}

.back{
padding:10px;
cursor:pointer;
color:#00ffd5;
}
</style>
</head>

<body>

<header>✨ AURA Studio</header>

<div id="artistsView" class="grid"></div>

<div id="songsView" class="hidden"></div>

<div class="player">
<iframe id="player"></iframe>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 שלך */
const firebaseConfig = {
  apiKey: "AIzaSyBpGG9LatbshTkGjJoBZ7oOycPaK0oVfqE",
  authDomain: "aura-x-9a67a.firebaseapp.com",
  projectId: "aura-x-9a67a",
  storageBucket: "aura-x-9a67a.firebasestorage.app",
  messagingSenderId: "62129686970",
  appId: "1:62129686970:web:eadfa4c379274135f5f583"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const artistsView = document.getElementById("artistsView");
const songsView = document.getElementById("songsView");
const player = document.getElementById("player");

/* 🎤 טעינת אמנים */
async function loadArtists(){
const snap = await getDocs(collection(db,"artists"));

artistsView.innerHTML="";

snap.forEach(doc=>{
const artist = doc.data();

const el = document.createElement("div");
el.className="card";

el.innerHTML=`
<div>${artist.name}</div>
<div style="color:#00ffd5;font-size:12px">
${artist.verified ? "✔ מאומת" : ""}
</div>
`;

el.onclick = ()=>openArtist(doc.id, artist.name);

artistsView.appendChild(el);
});
}

/* 🎧 אמן → שירים */
async function openArtist(id,name){

artistsView.classList.add("hidden");
songsView.classList.remove("hidden");

songsView.innerHTML = `
<div class="back" onclick="location.reload()">← חזרה</div>
<h2 style="padding:10px">${name}</h2>
`;

/* שירים */
const snap = await getDocs(collection(db,"artists",id,"songs"));

snap.forEach(doc=>{
const song = doc.data();

const el = document.createElement("div");
el.className="song";
el.innerText = song.title;

el.onclick = ()=>{
player.src = song.youtube + "?autoplay=1";
};

songsView.appendChild(el);
});
}

loadArtists();

</script>

</body>
</html>

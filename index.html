<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
}

header{
padding:20px;
text-align:center;
font-size:22px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:12px;
cursor:pointer;
text-align:center;
}

.card:hover{background:#222}

.song{
padding:12px;
border-bottom:1px solid #222;
cursor:pointer;
}

.song:hover{background:#111}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
}

iframe{
width:100%;
height:200px;
border:none;
}

.hidden{display:none}

.adminBtn{
position:fixed;
top:10px;
left:10px;
background:#00ffd5;
color:black;
padding:8px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="adminBtn" onclick="adminLogin()">ADMIN</div>

<header>🎧 AURA Studio</header>

<div id="artistsView" class="grid"></div>

<div id="songsView" class="hidden"></div>

<div class="player">
<iframe id="player"></iframe>
</div>

<script>

/* 🔐 סיסמה לפאנל */
const PASSWORD = "2004";

/* 💾 דאטה מקומי */
let data = JSON.parse(localStorage.getItem("aura")) || {
artists:[]
};

const artistsView = document.getElementById("artistsView");
const songsView = document.getElementById("songsView");
const player = document.getElementById("player");

/* 🎤 הצגת אמנים */
function renderArtists(){
artistsView.innerHTML="";

data.artists.forEach((a,i)=>{
const el=document.createElement("div");
el.className="card";
el.innerHTML=`
<div>${a.name}</div>
<div>${a.songs.length} שירים</div>
`;

el.onclick=()=>openArtist(i);
artistsView.appendChild(el);
});
}

/* 🎧 אמן */
function openArtist(index){

artistsView.classList.add("hidden");
songsView.classList.remove("hidden");

const artist=data.artists[index];

songsView.innerHTML=`
<div onclick="back()" style="padding:10px;color:#00ffd5;cursor:pointer">← חזרה</div>
<h2 style="padding:10px">${artist.name}</h2>
`;

artist.songs.forEach(song=>{
const el=document.createElement("div");
el.className="song";
el.innerText=song.title;

el.onclick=()=>{
player.src=song.youtube + "?autoplay=1";
};

songsView.appendChild(el);
});
}

/* 🔙 חזרה */
function back(){
songsView.classList.add("hidden");
artistsView.classList.remove("hidden");
}

/* 🔐 פאנל ניהול */
function adminLogin(){

const pass=prompt("סיסמה:");
if(pass!==PASSWORD){
alert("שגוי");
return;
}

const name=prompt("שם אמן:");

let artist = data.artists.find(a=>a.name===name);

if(!artist){
artist = {name:name,songs:[]};
data.artists.push(artist);
}

const title=prompt("שם שיר:");

const youtube=prompt("YouTube embed link:");

artist.songs.push({
title,
youtube
});

localStorage.setItem("aura",JSON.stringify(data));

renderArtists();
}

renderArtists();

</script>

</body>
</html>

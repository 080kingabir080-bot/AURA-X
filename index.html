<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio v3</title>

<style>
body{
margin:0;
font-family:system-ui;
background: radial-gradient(circle at top,#141420,#050507);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
padding:18px;
text-align:center;
font-weight:600;
background:rgba(255,255,255,0.03);
backdrop-filter: blur(10px);
}

/* VIEWS */
.view{
display:none;
padding:15px;
}
.active{display:block}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:12px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
border-radius:18px;
padding:16px;
cursor:pointer;
transition:0.25s;
border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
transform:scale(1.03);
background:rgba(255,255,255,0.12);
}

/* SONG */
.song{
padding:12px;
margin:6px 0;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
display:flex;
justify-content:space-between;
}

.song:hover{background:#222}

/* PLAYER */
.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.85);
backdrop-filter: blur(12px);
padding:12px;
display:flex;
flex-direction:column;
gap:8px;
}

button{
background:#00ffd5;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.small{
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<header>🎧 AURA Studio v3</header>

<!-- HOME -->
<div id="home" class="view active">
<div class="grid" id="artists"></div>
</div>

<!-- ARTIST -->
<div id="artistView" class="view">
<button onclick="back()">← חזרה</button>
<h2 id="artistName"></h2>
<div id="songs"></div>
</div>

<!-- PLAYER -->
<div class="player">
<div class="topbar">
<div id="now">לא מנגן</div>
<button onclick="toggle()">▶ / ⏸</button>
</div>

<div class="small">AURA Player</div>

<iframe id="yt"
width="0"
height="0"
src=""
allow="autoplay"
></iframe>
</div>

<script>

/* =========================
   🎧 DATA
========================= */

let DB={
artists:[
{
name:"Travis Scott",
songs:[
{title:"FE!N",id:"U-l4Ya3ejko"},
{title:"SICKO MODE",id:"6ONRf7h3Mdk"}
]
},
{
name:"Drake",
songs:[
{title:"God's Plan",id:"xpVfcZ0ZcFM"}
]
}
]
};

let currentVideo=null;

/* =========================
   🎤 HOME
========================= */

function renderArtists(){
artists.innerHTML="";

DB.artists.forEach(a=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML="🎤 "+a.name;

c.onclick=()=>openArtist(a);

artists.appendChild(c);
});
}

/* =========================
   🎧 OPEN ARTIST
========================= */

function openArtist(a){
home.classList.remove("active");
artistView.classList.add("active");

artistName.innerText=a.name;

songs.innerHTML="";

a.songs.forEach(s=>{
let d=document.createElement("div");
d.className="song";
d.innerHTML=`🎵 ${s.title}`;

d.onclick=()=>play(s);

songs.appendChild(d);
});
}

/* =========================
   ▶ PLAYER ENGINE (FIXED)
========================= */

function play(song){
currentVideo=song.id;

yt.src="https://www.youtube.com/embed/"+song.id+"?autoplay=1";

now.innerText="▶ "+song.title;
}

/* =========================
   ⏸ TOGGLE (fake control)
========================= */

function toggle(){
if(!currentVideo)return;

if(yt.src.includes("autoplay=1")){
yt.src=yt.src.replace("autoplay=1","");
}else{
yt.src+="?autoplay=1";
}
}

/* =========================
   🔙 BACK
========================= */

function back(){
artistView.classList.remove("active");
home.classList.add("active");
}

/* =========================
   INIT
========================= */

renderArtists();

</script>

</body>
</html>

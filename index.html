<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0a0a0f,#1c1c2e);
color:white;
}

header{
padding:20px;
text-align:center;
font-size:26px;
font-weight:700;
letter-spacing:3px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:12px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:18px;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.card:hover{
transform:scale(1.05);
}

.verified{
color:#00ffd5;
font-size:12px;
}

/* SONG */
.song{
padding:15px;
border-bottom:1px solid #222;
cursor:pointer;
}

.song:hover{
background:#111;
}

/* PLAYER */
.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
}

iframe{
width:100%;
height:200px;
border:none;
}

/* ADMIN */
.admin{
position:fixed;
top:10px;
left:10px;
background:#00ffd5;
color:black;
padding:8px;
border-radius:10px;
cursor:pointer;
}

/* HIDDEN */
.hidden{display:none;}
</style>
</head>

<body>

<header>✨ AURA Studio</header>

<div class="admin" onclick="openAdmin()">⚙️</div>

<div id="artistsView" class="grid"></div>

<div id="songsView" class="hidden"></div>

<div class="player">
<iframe id="player"></iframe>
</div>

<script>

/* 🔐 סיסמה */
const PASSWORD = "2004";

/* 🎵 דאטה */
let data = JSON.parse(localStorage.getItem("auraData")) || {
artists:[
{
name:"Travis Scott",
verified:true,
songs:[
{title:"FE!N",youtube:"https://www.youtube.com/embed/U-l4Ya3ejko?autoplay=1"},
{title:"SICKO MODE",youtube:"https://www.youtube.com/embed/6ONRf7h3Mdk?autoplay=1"}
]
}
]
};

const artistsView = document.getElementById("artistsView");
const songsView = document.getElementById("songsView");
const player = document.getElementById("player");

/* 🎤 הצגת אמנים */
function renderArtists(){
artistsView.innerHTML="";
data.artists.forEach((artist,i)=>{
const el=document.createElement("div");
el.className="card";
el.innerHTML=`
<div>${artist.name}</div>
<div class="verified">${artist.verified?"✔️ מאומת":""}</div>
<div>${artist.songs.length} שירים</div>
`;
el.onclick=()=>openArtist(i);
artistsView.appendChild(el);
});
}

/* 🎶 פתיחת אמן */
function openArtist(index){
artistsView.classList.add("hidden");
songsView.classList.remove("hidden");

const artist=data.artists[index];

songsView.innerHTML=`<h2 style="padding:10px">${artist.name}</h2>`;

artist.songs.forEach(song=>{
const el=document.createElement("div");
el.className="song";
el.innerText=song.title;
el.onclick=()=>player.src=song.youtube;
songsView.appendChild(el);
});
}

/* 🔙 חזרה */
function back(){
songsView.classList.add("hidden");
artistsView.classList.remove("hidden");
}

/* 🔐 פאנל ניהול */
function openAdmin(){
const pass=prompt("סיסמה:");
if(pass!==PASSWORD) return alert("שגוי");

const name=prompt("שם אמן:");
if(!name) return;

let artist=data.artists.find(a=>a.name===name);

if(!artist){
artist={name,verified:true,songs:[]};
data.artists.push(artist);
}

const title=prompt("שם שיר:");
const yt=prompt("קישור embed יוטיוב:");

artist.songs.push({title,youtube:yt});

localStorage.setItem("auraData",JSON.stringify(data));
renderArtists();
}

/* 🎯 מומלצים */
function recommended(){
return data.artists.sort((a,b)=>b.songs.length-a.songs.length).slice(0,3);
}

renderArtists();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:#050507;
color:white;
overflow-x:hidden;
}

/* 🔥 SPLASH SCREEN */
.splash{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:radial-gradient(circle,#0f0f1a,#000);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
animation:fadeOut 1s ease 3s forwards;
}

.logo{
font-size:40px;
letter-spacing:5px;
background:linear-gradient(90deg,#00ffd5,#8a2eff);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #00ffd5}
to{text-shadow:0 0 25px #8a2eff}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* HEADER */
header{
padding:20px;
text-align:center;
font-size:22px;
letter-spacing:3px;
opacity:0;
animation:fadeIn 1s ease 3.2s forwards;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:20px;
opacity:0;
animation:fadeIn 1s ease 3.5s forwards;
}

.card{
position:relative;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
cursor:pointer;
overflow:hidden;
transition:0.4s;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 25px rgba(0,255,213,0.3);
}

/* glow overlay */
.card::before{
content:"";
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(120deg,transparent,#00ffd540,transparent);
opacity:0;
transition:0.4s;
}

.card:hover::before{
opacity:1;
}

.artist-name{
font-size:18px;
margin-bottom:5px;
}

.verified{
font-size:12px;
color:#00ffd5;
}

.count{
font-size:12px;
opacity:0.7;
}

/* ANIMATION */
@keyframes fadeIn{
to{opacity:1}
}
</style>
</head>

<body>

<!-- 🔥 Splash -->
<div class="splash">
<div class="logo">AURA</div>
</div>

<header>✨ AURA Studio</header>

<div class="grid" id="artists"></div>

<script>

/* 🎵 DATA */
const artists = [
{name:"Travis Scott",songs:12,verified:true},
{name:"Drake",songs:9,verified:true},
{name:"Future",songs:7,verified:true},
{name:"Metro Boomin",songs:5,verified:true},
{name:"Don Toliver",songs:6,verified:true}
];

const container=document.getElementById("artists");

/* 🎤 render */
artists.forEach(a=>{
const el=document.createElement("div");
el.className="card";
el.innerHTML=`
<div class="artist-name">${a.name}</div>
<div class="verified">${a.verified?"✔️ VERIFIED":""}</div>
<div class="count">${a.songs} tracks</div>
`;
container.appendChild(el);
});

</script>

</body>
</html>

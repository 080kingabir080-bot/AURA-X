<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio Premium</title>

<style>

/* =========================
   🌌 BACKGROUND (PREMIUM FEEL)
========================= */

body{
margin:0;
font-family:system-ui;
background:
radial-gradient(circle at top,#1b1b2e,#050507 70%);
color:white;
overflow-x:hidden;
}

/* subtle noise overlay feel */
body::before{
content:"";
position:fixed;
inset:0;
background: url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
pointer-events:none;
}

/* =========================
   🔝 HEADER (GLASS)
========================= */

header{
padding:18px;
text-align:center;
font-size:20px;
font-weight:600;
letter-spacing:2px;

background:rgba(255,255,255,0.04);
backdrop-filter: blur(16px);
border-bottom:1px solid rgba(255,255,255,0.06);
}

/* =========================
   📱 LAYOUT
========================= */

.container{
padding:16px;
max-width:1100px;
margin:auto;
}

/* =========================
   🔍 SEARCH BAR (MODERN)
========================= */

input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
outline:none;

background:rgba(255,255,255,0.05);
color:white;

margin:10px 0;

box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}

/* =========================
   🎤 ARTIST GRID (PREMIUM CARDS)
========================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:14px;
}

.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
border-radius:22px;

padding:18px;
cursor:pointer;

transition:0.25s ease;

box-shadow:
0 10px 30px rgba(0,0,0,0.4),
inset 0 0 0 1px rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
background:rgba(255,255,255,0.12);
}

/* =========================
   🎵 SONG ITEM (APP STYLE)
========================= */

.song{
padding:14px;
margin:8px 0;

border-radius:14px;

background:rgba(255,255,255,0.05);

display:flex;
justify-content:space-between;
align-items:center;

cursor:pointer;

transition:0.2s;
}

.song:hover{
background:rgba(255,255,255,0.12);
transform:scale(1.01);
}

/* =========================
   🎧 PLAYER (SPOTIFY STYLE)
========================= */

.player{
position:fixed;
bottom:0;
left:0;
right:0;

background:rgba(10,10,15,0.9);
backdrop-filter: blur(18px);

border-top:1px solid rgba(255,255,255,0.08);

padding:12px;
}

.playerBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.nowPlaying{
font-size:14px;
opacity:0.9;
}

button{
background:linear-gradient(135deg,#00ffd5,#00a3ff);
border:none;

padding:10px 14px;
border-radius:12px;

font-weight:bold;
cursor:pointer;

box-shadow:0 8px 20px rgba(0,255,213,0.2);
}

/* hidden iframe player */
iframe{
width:0;
height:0;
}

/* =========================
   ✨ ANIMATIONS
========================= */

.fade{
animation:fade 0.35s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* =========================
   📱 MOBILE POLISH
========================= */

@media(max-width:600px){
.card{padding:14px}
.song{padding:12px}
}

</style>
</head>

<body>

<header>✨ AURA Studio</header>

<div class="container">

<input id="search" placeholder="חפש אמנים או שירים..." oninput="search()">

<h3>🎤 Artists</h3>
<div id="artists" class="grid"></div>

<h3>🎵 Songs</h3>
<div id="songs"></div>

</div>

<!-- PLAYER -->
<div class="player">

<div class="playerBar">
<div class="nowPlaying" id="now">לא מנגן</div>
<button onclick="toggle()">▶ / ⏸</button>
</div>

<iframe id="yt" allow="autoplay"></iframe>

</div>

<script>

/* =========================
   🎧 DATA
========================= */

let DB={
artists:[
{
name:"Travis Scott",
songs:[
{title:"FE!N",id:"U-l4Ya3ejko"},
{title:"SICKO MODE",id:"6ONRf7h3Mdk"}
]
},
{
name:"Drake",
songs:[
{title:"God's Plan",id:"xpVfcZ0ZcFM"}
]
}
]
};

let current=null;

/* =========================
   🎤 RENDER ARTISTS
========================= */

function render(){
artists.innerHTML="";

DB.artists.forEach(a=>{
let d=document.createElement("div");
d.className="card fade";
d.innerHTML="🎤 "+a.name;

d.onclick=()=>open(a);

artists.appendChild(d);
});
}

function open(a){
songs.innerHTML="";

a.songs.forEach(s=>{
let d=document.createElement("div");
d.className="song fade";
d.innerHTML="🎵 "+s.title;

d.onclick=()=>play(s);

songs.appendChild(d);
});
}

/* =========================
   ▶ PLAYER
========================= */

function play(song){
current=song;

yt.src="https://www.youtube.com/embed/"+song.id+"?autoplay=1&rel=0";

now.innerText="▶ "+song.title;
}

/* =========================
   ⏸ TOGGLE
========================= */

function toggle(){
if(!current)return;

if(yt.src.includes("autoplay=1")){
yt.src=yt.src.replace("autoplay=1","");
}else{
yt.src+="?autoplay=1";
}
}

/* =========================
   🔍 SEARCH
========================= */

function search(){
let q=search.value.toLowerCase();

artists.innerHTML="";

DB.artists.forEach(a=>{
if(a.name.toLowerCase().includes(q)){
let d=document.createElement("div");
d.className="card";
d.innerHTML=a.name;
d.onclick=()=>open(a);
artists.appendChild(d);
}
});
}

/* INIT */
render();

</script>

</body>
</html>

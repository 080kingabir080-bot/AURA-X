<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA ULTRA GIT</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0f;color:white}
header{padding:15px;text-align:center;background:#111}
.container{padding:15px}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:#00ffd5;color:black;font-weight:bold;cursor:pointer}
.card{padding:10px;margin:10px 0;background:#111;border-radius:10px;cursor:pointer}
.card:hover{background:#222}
.song{padding:10px;border-bottom:1px solid #222;cursor:pointer}
.song:hover{background:#111}
.hidden{display:none}
.player{position:fixed;bottom:0;left:0;right:0;background:#000;padding:10px}
iframe{width:100%;height:180px;border:none}
</style>
</head>

<body>

<header>🔐 AURA ULTRA GIT SYSTEM</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h3>Login Admin/User</h3>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<input id="search" placeholder="חיפוש..." oninput="search()">

<h3>אמנים</h3>
<div id="artists"></div>

<h3>מומלץ בשבילך</h3>
<div id="rec"></div>

<h3>היסטוריה</h3>
<div id="history"></div>

</div>

</div>

<div class="player">
<iframe id="player"></iframe>
</div>

<script>

/* =========================
   🔐 ADMIN SECURITY LAYER
========================= */

const ADMIN_USER = "admin";
const ADMIN_PASS_HASH = btoa("2004"); // obfuscation בסיסי

let session = null;

/* =========================
   💾 LOCAL USER DB
========================= */

let DB = JSON.parse(localStorage.getItem("aura_git")) || {
users:{},
history:{},
likes:{}
};

/* =========================
   📦 CONTENT (GitHub JSON SIMULATION)
========================= */

let content = {
artists:[
{name:"Travis Scott",songs:[
{t:"FE!N",v:"https://www.youtube.com/embed/U-l4Ya3ejko"}
]},
{name:"Drake",songs:[
{t:"God's Plan",v:"https://www.youtube.com/embed/xpVfcZ0ZcFM"}
]}
]
};

/* =========================
   🔐 HASH SIMPLE OBFUSCATION
========================= */

function hash(s){return btoa(s+"AURA")}

/* =========================
   LOGIN SYSTEM
========================= */

function login(){
let u=user.value;
let p=pass.value;

if(u===ADMIN_USER && hash(p)===ADMIN_PASS_HASH){
session="admin";
enterApp();
return;
}

if(!DB.users[u]){
DB.users[u]={pass:hash(p),history:[]};
}

if(DB.users[u].pass===hash(p)){
session=u;
enterApp();
}
}

/* =========================
   ENTER APP
========================= */

function enterApp(){
loginBox.classList.add("hidden");
app.classList.remove("hidden");
renderArtists();
renderHistory();
}

/* =========================
   ARTISTS
========================= */

function renderArtists(){
artists.innerHTML="";

content.artists.forEach(a=>{
let d=document.createElement("div");
d.className="card";
d.innerText=a.name;

d.onclick=()=>openArtist(a);

artists.appendChild(d);
});
}

/* =========================
   OPEN ARTIST
========================= */

function openArtist(a){
artists.innerHTML="";

a.songs.forEach(s=>{
let d=document.createElement("div");
d.className="song";
d.innerText=s.t;

d.onclick=()=>{
player.src=s.v+"?autoplay=1";

if(session && session!=="admin"){
DB.users[session].history.push(s.t);
localStorage.setItem("aura_git",JSON.stringify(DB));
renderHistory();
}
};

artists.appendChild(d);
});
}

/* =========================
   HISTORY
========================= */

function renderHistory(){
history.innerHTML="";

if(!DB.users[session])return;

DB.users[session].history.slice(-7).reverse().forEach(h=>{
let d=document.createElement("div");
d.innerText="🎧 "+h;
history.appendChild(d);
});
}

/* =========================
   SEARCH
========================= */

function search(){
let q=search.value.toLowerCase();
artists.innerHTML="";

content.artists.forEach(a=>{
if(a.name.toLowerCase().includes(q)){
let d=document.createElement("div");
d.className="card";
d.innerText=a.name;
d.onclick=()=>openArtist(a);
artists.appendChild(d);
}
});
}

</script>

</body>
</html>

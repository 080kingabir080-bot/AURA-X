<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio</title>

<style>

/* =========================
   🎨 GLOBAL UI SYSTEM
========================= */

body{
margin:0;
font-family:system-ui, Arial;
background: radial-gradient(circle at top,#12121a,#050507);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
padding:18px;
text-align:center;
font-size:20px;
letter-spacing:2px;
font-weight:600;
background:rgba(255,255,255,0.03);
backdrop-filter: blur(10px);
position:sticky;
top:0;
}

/* =========================
   📱 LAYOUT SYSTEM
========================= */

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:14px;
}

/* =========================
   🧊 GLASS CARD UI
========================= */

.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:18px;
cursor:pointer;
transition:0.25s ease;
backdrop-filter: blur(12px);
box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-6px) scale(1.02);
background:rgba(255,255,255,0.1);
}

/* SONG ITEM */
.song{
padding:12px;
margin:6px 0;
border-radius:12px;
background:rgba(255,255,255,0.04);
cursor:pointer;
transition:0.2s;
}

.song:hover{
background:rgba(255,255,255,0.1);
}

/* =========================
   🎧 PLAYER BAR
========================= */

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.8);
backdrop-filter: blur(15px);
padding:10px;
border-top:1px solid rgba(255,255,255,0.1);
}

iframe{
width:100%;
height:180px;
border:none;
border-radius:12px;
}

/* =========================
   🔍 INPUTS
========================= */

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
outline:none;
margin-bottom:10px;
background:rgba(255,255,255,0.05);
color:white;
}

/* =========================
   ✨ ANIMATION SYSTEM
========================= */

.fade{
animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* =========================
   📱 MOBILE FIX
========================= */

@media(max-width:600px){
.card{padding:14px}
iframe{height:160px}
}

</style>
</head>

<body>

<header>✨ AURA Studio</header>

<div class="container">

<!-- 🔍 SEARCH -->
<input id="search" placeholder="חפש אמנים או שירים..." oninput="search()">

<!-- 🎤 ARTISTS -->
<h3>אמנים</h3>
<div id="artists" class="grid"></div>

<!-- 🎧 EMBED LIBRARY (החלק החשוב שלך) -->
<h3>📦 Library (הטמעות שירים)</h3>
<div id="library"></div>

</div>

<!-- 🎧 PLAYER -->
<div class="player">
<iframe id="player"></iframe>
</div>

<script>

/* =========================
   📦 DATA SYSTEM
========================= */

let DB = JSON.parse(localStorage.getItem("aura_ui")) || {
artists:[
{
name:"Travis Scott",
songs:[
{
title:"FE!N",
embed:"https://www.youtube.com/embed/U-l4Ya3ejko"
}
]
}
]
};

/* =========================
   🎤 RENDER ARTISTS
========================= */

function renderArtists(){
artists.innerHTML="";

DB.artists.forEach(a=>{
let div=document.createElement("div");
div.className="card fade";
div.innerHTML=`🎤 ${a.name}`;

div.onclick=()=>{
openArtist(a);
};

artists.appendChild(div);
});
}

/* =========================
   🎧 OPEN ARTIST
========================= */

function openArtist(a){
artists.innerHTML="";

a.songs.forEach(s=>{
let div=document.createElement("div");
div.className="song fade";
div.innerHTML=`🎵 ${s.title}`;

div.onclick=()=>{
play(s.embed);
};

artists.appendChild(div);
});
}

/* =========================
   ▶ PLAY ENGINE
========================= */

function play(url){
player.src=url+"?autoplay=1";
}

/* =========================
   🔍 SEARCH ENGINE
========================= */

function search(){
let q=search.value.toLowerCase();

artists.innerHTML="";

DB.artists.forEach(a=>{
if(a.name.toLowerCase().includes(q)){

let div=document.createElement("div");
div.className="card";
div.innerHTML=a.name;

div.onclick=()=>openArtist(a);

artists.appendChild(div);
}
});
}

/* =========================
   📦 EMBED LIBRARY VIEW
   (זה המקום שאתה ביקשת)
========================= */

function renderLibrary(){
library.innerHTML="";

DB.artists.forEach(a=>{
a.songs.forEach(s=>{

let box=document.createElement("div");
box.className="song";
box.innerHTML=`🎧 ${s.title}`;

box.onclick=()=>{
play(s.embed);
};

library.appendChild(box);

});
});
}

/* =========================
   💾 SAVE
========================= */

function save(){
localStorage.setItem("aura_ui",JSON.stringify(DB));
}

/* =========================
   🚀 INIT
========================= */

renderArtists();
renderLibrary();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio</title>

<style>

/* =========================
   🌌 BACKGROUND SYSTEM
========================= */

body{
margin:0;
font-family: system-ui, -apple-system, sans-serif;

background:
radial-gradient(1200px 600px at 20% 0%, #1a1a2e 0%, transparent 60%),
radial-gradient(1000px 500px at 80% 10%, #0f3460 0%, transparent 55%),
#050507;

color:white;
overflow-x:hidden;
}

/* subtle texture */
body::before{
content:"";
position:fixed;
inset:0;
background: url('https://grainy-gradients.vercel.app/noise.svg');
opacity:0.05;
pointer-events:none;
}

/* =========================
   🔝 TOP BAR (APP STYLE)
========================= */

header{
position:sticky;
top:0;

padding:16px;

background:rgba(10,10,15,0.6);
backdrop-filter: blur(18px);

border-bottom:1px solid rgba(255,255,255,0.06);

text-align:center;
font-weight:600;
letter-spacing:2px;
}

/* =========================
   📱 MAIN LAYOUT
========================= */

.container{
max-width:1100px;
margin:auto;
padding:16px;
}

/* =========================
   🔍 SEARCH (PREMIUM FIELD)
========================= */

input{
width:100%;
padding:14px 16px;

border-radius:14px;
border:1px solid rgba(255,255,255,0.08);

background:rgba(255,255,255,0.04);
color:white;

outline:none;

box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
transition:0.2s;
}

input:focus{
border-color:#00ffd5;
box-shadow:0 0 20px rgba(0,255,213,0.2);
}

/* =========================
   🎤 GRID (PREMIUM CARDS)
========================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:14px;
margin-top:12px;
}

/* CARD DESIGN */
.card{
background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));

border:1px solid rgba(255,255,255,0.08);
border-radius:18px;

padding:18px;

cursor:pointer;

transition:0.25s ease;

box-shadow:
0 20px 40px rgba(0,0,0,0.4),
inset 0 0 0 1px rgba(255,255,255,0.03);
}

.card:hover{
transform:translateY(-6px);
border-color:#00ffd5;
}

/* =========================
   🎵 SONG LIST
========================= */

.song{
padding:14px;
margin:8px 0;

border-radius:14px;

background:rgba(255,255,255,0.04);

display:flex;
justify-content:space-between;
align-items:center;

cursor:pointer;

transition:0.2s;
}

.song:hover{
background:rgba(255,255,255,0.1);
transform:scale(1.01);
}

/* =========================
   🎧 PLAYER (SPOTIFY STYLE)
========================= */

.player{
position:fixed;
bottom:0;
left:0;
right:0;

padding:14px;

background:rgba(0,0,0,0.75);
backdrop-filter: blur(20px);

border-top:1px solid rgba(255,255,255,0.08);
}

.bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.now{
font-size:14px;
opacity:0.9;
}

/* BUTTON */
button{
background: linear-gradient(135deg,#00ffd5,#00a3ff);
border:none;

padding:10px 14px;
border-radius:12px;

cursor:pointer;
font-weight:600;

box-shadow:0 10px 30px rgba(0,255,213,0.2);
}

/* hidden iframe (clean UI) */
iframe{
width:0;
height:0;
}

/* =========================
   ✨ ANIMATION
========================= */

.fade{
animation:fade 0.35s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* =========================
   📱 MOBILE OPTIMIZATION
========================= */

@media(max-width:600px){
.card{padding:14px}
.song{padding:12px}
}

</style>
</head>

<body>

<header>✨ AURA Studio</header>

<div class="container">

<input id="search" placeholder="חפש אמנים או שירים..." oninput="search()">

<h3>🎤 Artists</h3>
<div id="artists" class="grid"></div>

<h3>🎵 Songs</h3>
<div id="songs"></div>

</div>

<!-- PLAYER -->
<div class="player">

<div class="bar">
<div class="now" id="now">לא מנגן</div>
<button onclick="toggle()">▶ / ⏸</button>
</div>

<iframe id="yt" allow="autoplay"></iframe>

</div>

<script>

/* =========================
   🎧 DATA
========================= */

let DB={
artists:[
{
name:"Travis Scott",
songs:[
{title:"FE!N",id:"U-l4Ya3ejko"},
{title:"SICKO MODE",id:"6ONRf7h3Mdk"}
]
},
{
name:"Drake",
songs:[
{title:"God's Plan",id:"xpVfcZ0ZcFM"}
]
}
]
};

let current=null;

/* =========================
   🎤 RENDER
========================= */

function render(){
artists.innerHTML="";

DB.artists.forEach(a=>{
let d=document.createElement("div");
d.className="card fade";
d.innerHTML="🎤 "+a.name;

d.onclick=()=>open(a);

artists.appendChild(d);
});
}

function open(a){
songs.innerHTML="";

a.songs.forEach(s=>{
let d=document.createElement("div");
d.className="song fade";
d.innerHTML="🎵 "+s.title;

d.onclick=()=>play(s);

songs.appendChild(d);
});
}

/* =========================
   ▶ PLAYER ENGINE
========================= */

function play(song){
current=song;

yt.src="https://www.youtube.com/embed/"+song.id+"?autoplay=1&rel=0";

now.innerText="▶ "+song.title;
}

/* =========================
   ⏸ TOGGLE
========================= */

function toggle(){
if(!current)return;

if(yt.src.includes("autoplay=1")){
yt.src=yt.src.replace("autoplay=1","");
}else{
yt.src+="?autoplay=1";
}
}

/* =========================
   🔍 SEARCH
========================= */

function search(){
let q=search.value.toLowerCase();

artists.innerHTML="";

DB.artists.forEach(a=>{
if(a.name.toLowerCase().includes(q)){
let d=document.createElement("div");
d.className="card";
d.innerHTML=a.name;
d.onclick=()=>open(a);
artists.appendChild(d);
}
});
}

/* INIT */
render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA ULTRA</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
}

header{
padding:18px;
text-align:center;
font-size:22px;
background:#111;
letter-spacing:2px;
}

.container{padding:15px}

input,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
cursor:pointer;
background:#00ffd5;
color:black;
font-weight:bold;
}

.card{
background:rgba(255,255,255,0.05);
padding:12px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
}

.card:hover{background:#222}

.song{
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.song:hover{background:#111}

.hidden{display:none}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
}

iframe{
width:100%;
height:180px;
border:none;
}
</style>
</head>

<body>

<header>🔐 AURA ULTRA SECURE</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h3>כניסה למערכת</h3>
<input id="user" placeholder="שם משתמש"><br>
<input id="pass" type="password" placeholder="סיסמה"><br>
<button onclick="login()">כניסה</button>
<button onclick="register()">הרשמה</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h3>אמנים</h3>
<div id="artists"></div>

<h3>היסטוריה</h3>
<div id="history"></div>

<button onclick="adminMode()">ADMIN MODE</button>

</div>

</div>

<div class="player">
<iframe id="player"></iframe>
</div>

<script>

/* =========================
   🧠 LOCAL DATABASE
========================= */

let DB = JSON.parse(localStorage.getItem("aura_ultra_db")) || {
users:{},
artists:[
{name:"Travis Scott",songs:[
{t:"FE!N",v:"https://www.youtube.com/embed/U-l4Ya3ejko"}
]}
]
};

/* =========================
   🔐 SESSION
========================= */

let sessionUser = null;

/* =========================
   🔐 SIMPLE HASH (obfuscation)
========================= */

function hash(str){
let h=0;
for(let i=0;i<str.length;i++){
h=(h<<5)-h+str.charCodeAt(i);
h|=0;
}
return h;
}

/* =========================
   REGISTER
========================= */

function register(){
let u=user.value;
let p=pass.value;

if(!u||!p)return;

DB.users[u]={
pass:hash(p),
history:[],
likes:[]
};

save();
alert("נרשם!");
}

/* =========================
   LOGIN
========================= */

function login(){
let u=user.value;
let p=pass.value;

if(DB.users[u] && DB.users[u].pass===hash(p)){
sessionUser=u;
loginBox.classList.add("hidden");
app.classList.remove("hidden");
renderArtists();
renderHistory();
}else{
alert("שגיאה");
}
}

/* =========================
   SAVE
========================= */

function save(){
localStorage.setItem("aura_ultra_db",JSON.stringify(DB));
}

/* =========================
   ARTISTS
========================= */

function renderArtists(){
artists.innerHTML="";

DB.artists.forEach(a=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=a.name;

div.onclick=()=>{
showSongs(a);
};

artists.appendChild(div);
});
}

/* =========================
   SONG VIEW
========================= */

function showSongs(artist){
artists.innerHTML="";

artist.songs.forEach(s=>{
let div=document.createElement("div");
div.className="song";
div.innerText=s.t;

div.onclick=()=>{
player.src=s.v+"?autoplay=1";

DB.users[sessionUser].history.push(s.t);
save();
renderHistory();
};

artists.appendChild(div);
});
}

/* =========================
   HISTORY (MEMORY SYSTEM)
========================= */

function renderHistory(){
history.innerHTML="";

if(!DB.users[sessionUser])return;

DB.users[sessionUser].history
.slice(-5)
.reverse()
.forEach(h=>{
let d=document.createElement("div");
d.innerText="🎧 "+h;
history.appendChild(d);
});
}

/* =========================
   ADMIN MODE
========================= */

function adminMode(){
if(sessionUser!=="admin"){
alert("אין הרשאה");
return;
}

let name=prompt("אמן חדש:");
let song=prompt("שיר:");
let url=prompt("YouTube embed");

DB.artists.push({
name,
songs:[{t:song,v:url}]
});

save();
renderArtists();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<meta name="theme-color" content="#0f0f0f">

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: radial-gradient(circle at top,#1f1f2e,#0a0a0f);
    color:white;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    font-size:26px;
    font-weight:700;
    letter-spacing:3px;
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(10px);
}

/* SONG LIST */
.container{
    padding:15px;
    padding-bottom:120px;
}

.song{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    margin-bottom:12px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    cursor:pointer;
    transition:0.3s;
}

.song:hover{
    transform:scale(1.02);
    background:rgba(255,255,255,0.08);
}

.song.playing{
    border:1px solid #00ffd5;
    color:#00ffd5;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:rgba(10,10,15,0.95);
    backdrop-filter:blur(15px);
    border-top:1px solid #222;
    padding:10px;
}

iframe{
    width:100%;
    height:200px;
    border:none;
    border-radius:12px;
}

/* ANIMATION */
.song{
    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px)}
    to{opacity:1; transform:translateY(0)}
}
</style>
</head>

<body>

<header>✨ AURA Studio</header>

<div class="container" id="songList"></div>

<div class="player">
    <iframe id="player"></iframe>
</div>

<script>
/* 🎵 ניהול שירים */
const songs = [
{
title:"Travis Scott - FE!N",
artist:"Travis Scott",
youtube:"https://www.youtube.com/embed/U-l4Ya3ejko?autoplay=1"
},
{
title:"Drake - God's Plan",
artist:"Drake",
youtube:"https://www.youtube.com/embed/xpVfcZ0ZcFM?autoplay=1"
}
];

const list = document.getElementById("songList");
const player = document.getElementById("player");

let currentIndex = 0;

/* 🎧 רינדור */
function renderSongs(){
list.innerHTML="";
songs.forEach((song,index)=>{
const el=document.createElement("div");
el.className="song";
el.innerHTML=`
<div>
<div>${song.title}</div>
<small>${song.artist}</small>
</div>
▶
`;
el.onclick=()=>playSong(index,el);
list.appendChild(el);
});
}

/* ▶ ניגון */
function playSong(index,element){
currentIndex=index;
player.src=songs[index].youtube;

document.querySelectorAll(".song").forEach(s=>s.classList.remove("playing"));
element.classList.add("playing");

setMediaSession(songs[index]);
}

/* 📱 שליטה במסך נעילה */
function setMediaSession(song){
if('mediaSession' in navigator){
navigator.mediaSession.metadata = new MediaMetadata({
title: song.title,
artist: song.artist,
album: "AURA Studio"
});

navigator.mediaSession.setActionHandler('play',()=>{});
navigator.mediaSession.setActionHandler('pause',()=>{player.src=""});
navigator.mediaSession.setActionHandler('previoustrack',()=>prev());
navigator.mediaSession.setActionHandler('nexttrack',()=>next());
}
}

function next(){
currentIndex=(currentIndex+1)%songs.length;
renderSongs();
playSong(currentIndex,document.querySelectorAll(".song")[currentIndex]);
}

function prev(){
currentIndex=(currentIndex-1+songs.length)%songs.length;
renderSongs();
playSong(currentIndex,document.querySelectorAll(".song")[currentIndex]);
}

renderSongs();

/* 🔥 PWA */
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
